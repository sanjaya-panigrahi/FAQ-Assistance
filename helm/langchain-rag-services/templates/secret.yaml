apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langchain-rag-services.fullname" . }}
  labels:
    {{- include "langchain-rag-services.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.JWT_SECRET | quote }}
  neo4j-password: {{ .Values.secrets.NEO4J_PASSWORD | quote }}
  {{- if .Values.secrets.OPENAI_API_KEY }}
  openai-api-key: {{ .Values.secrets.OPENAI_API_KEY | quote }}
  {{- else }}
  openai-api-key: ""
  {{- end }}
