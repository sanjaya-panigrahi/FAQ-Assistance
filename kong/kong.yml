_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Content-Type
        - Authorization
        - X-Requested-With
        - Accept
      credentials: true
      max_age: 3600

upstreams:
  - name: spring-neo4j-graph-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /actuator/health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
      passive:
        healthy:
          successes: 2
        unhealthy:
          http_failures: 5
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: spring-ai-neo4j-graph:9000
        weight: 100

services:
  - name: spring-agentic
    url: http://spring-ai-agentic:9000
    routes:
      - name: spring-agentic-route
        paths:
          - /spring/agentic
        strip_path: true

  - name: spring-neo4j-graph
    host: spring-neo4j-graph-upstream
    protocol: http
    port: 80
    retries: 5
    connect_timeout: 120000
    write_timeout: 120000
    read_timeout: 180000
    routes:
      - name: spring-neo4j-graph-route
        paths:
          - /spring/graph
        strip_path: true

  - name: spring-corrective
    url: http://spring-ai-corrective:9000
    connect_timeout: 120000
    write_timeout: 120000
    read_timeout: 180000
    retries: 1
    routes:
      - name: spring-corrective-route
        paths:
          - /spring/corrective
        strip_path: true

  - name: spring-multimodal
    url: http://spring-ai-multimodal:9000
    connect_timeout: 120000
    write_timeout: 120000
    read_timeout: 180000
    retries: 1
