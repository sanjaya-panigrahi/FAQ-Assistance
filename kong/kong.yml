_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Content-Type
        - Authorization
        - X-Requested-With
        - Accept
      credentials: true
      max_age: 3600


services:
  - name: spring-agentic
    url: http://spring-ai-unified:9000/agentic
    connect_timeout: 120000
    write_timeout: 120000
    read_timeout: 180000
    retries: 1
    routes:
      - name: spring-agentic-route
        paths:
          - /spring/agentic
        strip_path: true

  - name: spring-neo4j-graph
    url: http://spring-ai-unified:9000/graph
    connect_timeout: 120000
