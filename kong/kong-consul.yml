_format_version: "3.0"
_transform: true

services:
  - name: spring-agentic
    url: http://spring-ai-unified.service.consul:9000/agentic
    routes:
      - name: spring-agentic-route
        paths:
          - /spring/agentic
        strip_path: true

  - name: spring-neo4j-graph
    url: http://spring-ai-unified.service.consul:9000/graph
    routes:
      - name: spring-neo4j-graph-route
        paths:
          - /spring/graph
        strip_path: true

  - name: spring-corrective
    url: http://spring-ai-unified.service.consul:9000/corrective
    routes:
      - name: spring-corrective-route
        paths:
          - /spring/corrective
        strip_path: true

  - name: spring-multimodal
    url: http://spring-ai-unified.service.consul:9000/multimodal
    routes:
      - name: spring-multimodal-route
        paths:
          - /spring/multimodal
        strip_path: true

  - name: spring-hierarchical
    url: http://spring-ai-unified.service.consul:9000/hierarchical
    routes:
      - name: spring-hierarchical-route
        paths:
          - /spring/hierarchical
        strip_path: true

  - name: faq-ingestion
    url: http://faq-ingestion.service.consul:9000
    connect_timeout: 120000
    write_timeout: 120000
    read_timeout: 300000
    retries: 3
    routes:
      - name: faq-ingestion-route
        paths:
          - /spring/ingestion
        strip_path: true

  - name: spring-faq-retrieval
    url: http://spring-ai-faq-retrieval.service.consul:9010
    routes:
      - name: spring-faq-retrieval-route
        paths:
          - /spring/retrieval
        strip_path: true

  - name: langchain-unified-agentic
