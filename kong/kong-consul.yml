    routes:
      - name: langchain-corrective-route
        paths:
          - /langchain/corrective
        strip_path: true

  - name: langchain-multimodal
    url: http://langchain-multimodal.service.consul:8000
    routes:
      - name: langchain-multimodal-route
        paths:
          - /langchain/multimodal
        strip_path: true

  - name: langchain-hierarchical
    url: http://langchain-hierarchical.service.consul:8000
    routes:
      - name: langchain-hierarchical-route
        paths:
          - /langchain/hierarchical
        strip_path: true

  - name: langgraph-agentic
    url: http://langgraph-agentic.service.consul:8281
    routes:
      - name: langgraph-agentic-route
        paths:
          - /langgraph/agentic
        strip_path: true

  - name: langgraph-neo4j-graph
    url: http://langgraph-neo4j-graph.service.consul:8000
    routes:
      - name: langgraph-neo4j-graph-route
        paths:
          - /langgraph/graph
        strip_path: true

  - name: langgraph-corrective
    url: http://langgraph-corrective.service.consul:8000
    routes:
      - name: langgraph-corrective-route
        paths:
          - /langgraph/corrective
        strip_path: true

  - name: langgraph-multimodal
