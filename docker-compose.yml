services:
  neo4j:
    image: neo4j:5.22
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  spring-ai-agentic:
    build:
      context: ./spring-ai-agentic
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro

  spring-ai-neo4j-graph:
    build:
      context: ./spring-ai-neo4j-graph
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    depends_on:
      - neo4j
    volumes:
      - ./shared-data:/opt/data:ro

  spring-ai-corrective:
    build:
      context: ./spring-ai-corrective
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro

  spring-ai-multimodal:
    build:
      context: ./spring-ai-multimodal
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro

  spring-ai-hierarchical:
    build:
      context: ./spring-ai-hierarchical
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro

  faq-assistance-ui:
    build:
      context: ./faq-assistance-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - spring-ai-agentic
      - spring-ai-neo4j-graph
      - spring-ai-corrective
      - spring-ai-multimodal
      - spring-ai-hierarchical
