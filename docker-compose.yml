services:
  neo4j:
    image: neo4j:5.22
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  spring-ai-unified:
    build:
      context: ./spring-ai-unified
      dockerfile: Dockerfile
    ports:
        - "9000:9000"
    env_file: .env
    depends_on:
      - neo4j
    volumes:
      - ./shared-data:/opt/data:ro

  faq-assistance-ui:
    build:
      context: ./faq-assistance-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - spring-ai-unified
