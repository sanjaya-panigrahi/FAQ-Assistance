services:
  # Spring AI Stack
  neo4j-spring:
    image: neo4j:5.24
    container_name: neo4j-spring
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - faq-network

  spring-ai-agentic:
    build:
      context: ./spring-ai-agentic
    ports:
      - "8081:9000"
    env_file: .env
    depends_on:
      neo4j-spring:
        condition: service_healthy
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-neo4j-graph:
    build:
      context: ./spring-ai-neo4j-graph
    ports:
      - "8082:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-spring:7687
    depends_on:
      neo4j-spring:
        condition: service_healthy
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-corrective:
    build:
      context: ./spring-ai-corrective
    ports:
      - "8083:9000"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-multimodal:
    build:
      context: ./spring-ai-multimodal
    ports:
      - "8084:9000"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-hierarchical:
    build:
      context: ./spring-ai-hierarchical
    ports:
      - "8085:9000"
    env_file: .env
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # LangChain Stack
  neo4j-langchain:
    image: neo4j:5.24
    container_name: neo4j-langchain
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - faq-network

  langchain-agentic:
    build:
      context: ./langchain-agentic
    ports:
      - "8181:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-neo4j-graph:
    build:
      context: ./langchain-neo4j-graph
    ports:
      - "8182:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-langchain:7687
    depends_on:
      neo4j-langchain:
        condition: service_healthy
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-corrective:
    build:
      context: ./langchain-corrective
    ports:
      - "8183:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-multimodal:
    build:
      context: ./langchain-multimodal
    ports:
      - "8184:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-hierarchical:
    build:
      context: ./langchain-hierarchical
    ports:
      - "8185:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # LangGraph Stack
  neo4j-langgraph:
    image: neo4j:5.24
    container_name: neo4j-langgraph
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - faq-network

  langgraph-agentic:
    build:
      context: ./langgraph-agentic
    ports:
      - "8281:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-neo4j-graph:
    build:
      context: ./langgraph-neo4j-graph
    ports:
      - "8282:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-langgraph:7687
    depends_on:
      neo4j-langgraph:
        condition: service_healthy
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-corrective:
    build:
      context: ./langgraph-corrective
    ports:
      - "8283:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-multimodal:
    build:
      context: ./langgraph-multimodal
    ports:
      - "8284:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-hierarchical:
    build:
      context: ./langgraph-hierarchical
    ports:
      - "8285:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # FAQ Ingestion Stack - ChromaDB + Spring AI multi-tenant ingestion service
  chroma-faq:
    image: ${FAQ_CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    container_name: ${FAQ_CHROMA_CONTAINER_NAME:-chroma-faq}
    ports:
      - "${FAQ_CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_faq_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "(exec 3<>/dev/tcp/localhost/8000 && printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3) || (exec 4<>/dev/tcp/localhost/8000 && printf 'GET /api/v1/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&4 && grep -q '200 OK' <&4)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - faq-network
    restart: unless-stopped

  faq-ingestion:
    build:
      context: ./spring-ai-faq-ingestion
      dockerfile: Dockerfile
    container_name: ${FAQ_INGESTION_CONTAINER_NAME:-faq-ingestion}
    ports:
      - "${FAQ_INGESTION_PORT:-9000}:9000"
    env_file: .env
    depends_on:
      chroma-faq:
        condition: service_healthy
    volumes:
      - faq_uploads:/app/uploads
      - faq_chroma:/app/chroma_data
      - faq_metadata:/app/data
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FAQ_INGESTION_PORT:-9000}/api/faq-ingestion/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  spring-ai-faq-retrieval:
    build:
      context: ./spring-ai-faq-retrieval
      dockerfile: Dockerfile
    container_name: ${FAQ_RETRIEVAL_SERVICE_NAME:-spring-ai-faq-retrieval}
    ports:
      - "${FAQ_RETRIEVAL_PORT:-9010}:9010"
    env_file: .env
    environment:
      SERVER_PORT: 9010
      RETRIEVAL_SERVICE_PORT: 9010
    depends_on:
      chroma-faq:
        condition: service_healthy
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  analytics-mysql:
    image: mysql:8.4
    container_name: analytics-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: rag_analytics
      MYSQL_USER: analytics
      MYSQL_PASSWORD: analyticspass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - analytics_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - faq-network
    restart: unless-stopped

  rag-analytics:
    build:
      context: ./rag-analytics
      dockerfile: Dockerfile
    container_name: rag-analytics
    ports:
      - "9191:9191"
    environment:
      APP_PORT: 9191
      ANALYTICS_DB_HOST: analytics-mysql
      ANALYTICS_DB_PORT: 3306
      ANALYTICS_DB_NAME: rag_analytics
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: analyticspass
    depends_on:
      analytics-mysql:
        condition: service_healthy
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9191/actuator/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # React UI - connects to all three stacks
  faq-ui:
    build:
      context: ./faq-assistance-ui
    ports:
      - "5173:5173"
    depends_on:
      - spring-ai-agentic
      - langchain-agentic
      - langgraph-agentic
    networks:
      - faq-network
    environment:
      VITE_API_HOST: localhost

volumes:
  chroma_faq_data:
    driver: local
  faq_uploads:
    driver: local
  faq_chroma:
    driver: local
  faq_metadata:
    driver: local
  analytics_mysql_data:
    driver: local

networks:
  faq-network:
    driver: bridge
