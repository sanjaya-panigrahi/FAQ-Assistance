services:
  # Unified Neo4j Database (consolidated from 3 separate instances)
  neo4j-unified:
    image: neo4j:5.24
    container_name: neo4j-unified
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - faq-network
    restart: unless-stopped

  # Spring AI Stack

  spring-ai-agentic:
    build:
      context: ./spring-ai-agentic
    ports:
      - "8081:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-neo4j-graph:
    build:
      context: ./spring-ai-neo4j-graph
    ports:
      - "8082:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-faq-kafka:29092}
      APP_EVENTS_ENABLED: ${APP_EVENTS_ENABLED:-false}
      APP_EVENTS_CONSUMER_ENABLED: ${APP_EVENTS_CONSUMER_ENABLED:-false}
      APP_EVENTS_TOPIC: ${APP_EVENTS_TOPIC:-graph.tasks.lifecycle.v1}
      APP_EVENTS_CONSUMER_GROUP_ID: ${APP_EVENTS_CONSUMER_GROUP_ID:-spring-ai-neo4j-graph-consumer}
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-corrective:
    build:
      context: ./spring-ai-corrective
    ports:
      - "8083:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-multimodal:
    build:
      context: ./spring-ai-multimodal
    ports:
      - "8084:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  spring-ai-hierarchical:
    build:
      context: ./spring-ai-hierarchical
    ports:
      - "8085:9000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # LangChain Stack

  langchain-agentic:
    build:
      context: ./langchain-agentic
    ports:
      - "8181:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-retrieval-service:
    build:
      context: ./langchain-retrieval-service
    ports:
      - "8186:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      chroma-faq:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-neo4j-graph:
    build:
      context: ./langchain-neo4j-graph
    ports:
      - "8182:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
      REDIS_HOST: redis-cache
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-neo4j-graph-worker:
    build:
      context: ./langchain-neo4j-graph
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
      REDIS_HOST: redis-cache
      CELERY_BROKER_URL: redis://redis-cache:6379/2
      CELERY_RESULT_BACKEND: redis://redis-cache:6379/3
    depends_on:
      neo4j-unified:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-corrective:
    build:
      context: ./langchain-corrective
    ports:
      - "8183:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-multimodal:
    build:
      context: ./langchain-multimodal
    ports:
      - "8184:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langchain-hierarchical:
    build:
      context: ./langchain-hierarchical
    ports:
      - "8185:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # LangGraph Stack

  langgraph-agentic:
    build:
      context: ./langgraph-agentic
    ports:
      - "8281:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-retrieval-service:
    build:
      context: ./langgraph-retrieval-service
    ports:
      - "8286:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      chroma-faq:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-neo4j-graph:
    build:
      context: ./langgraph-neo4j-graph
    ports:
      - "8282:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
      REDIS_HOST: redis-cache
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-neo4j-graph-worker:
    build:
      context: ./langgraph-neo4j-graph
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j-unified:7687
      REDIS_HOST: redis-cache
      CELERY_BROKER_URL: redis://redis-cache:6379/4
      CELERY_RESULT_BACKEND: redis://redis-cache:6379/5
    depends_on:
      neo4j-unified:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-corrective:
    build:
      context: ./langgraph-corrective
    ports:
      - "8283:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-multimodal:
    build:
      context: ./langgraph-multimodal
    ports:
      - "8284:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  langgraph-hierarchical:
    build:
      context: ./langgraph-hierarchical
    ports:
      - "8285:8000"
    env_file: .env
    environment:
      APP_PORT: 8000
      NEO4J_URI: bolt://neo4j-unified:7687
    depends_on:
      neo4j-unified:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - ./shared-data:/opt/data:ro
    networks:
      - faq-network

  # Redis Cache for Query Response Caching
  redis-cache:
    image: redis:7.2-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faq-network
    restart: unless-stopped

  # FAQ Ingestion Stack - ChromaDB + Spring AI multi-tenant ingestion service
  chroma-faq:
    image: ${FAQ_CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    container_name: ${FAQ_CHROMA_CONTAINER_NAME:-chroma-faq}
    ports:
      - "${FAQ_CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_faq_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "(exec 3<>/dev/tcp/localhost/8000 && printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3) || (exec 4<>/dev/tcp/localhost/8000 && printf 'GET /api/v1/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&4 && grep -q '200 OK' <&4)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - faq-network
    restart: unless-stopped

  faq-ingestion:
    build:
      context: ./spring-ai-faq-ingestion
      dockerfile: Dockerfile
    container_name: ${FAQ_INGESTION_CONTAINER_NAME:-faq-ingestion}
    ports:
      - "${FAQ_INGESTION_PORT:-9000}:9000"
    env_file: .env
    depends_on:
      chroma-faq:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - faq_uploads:/app/uploads
      - faq_chroma:/app/chroma_data
      - faq_metadata:/app/data
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FAQ_INGESTION_PORT:-9000}/api/faq-ingestion/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  spring-ai-faq-retrieval:
    build:
      context: ./spring-ai-faq-retrieval
      dockerfile: Dockerfile
    container_name: ${FAQ_RETRIEVAL_SERVICE_NAME:-spring-ai-faq-retrieval}
    ports:
      - "${FAQ_RETRIEVAL_PORT:-9010}:9010"
    env_file: .env
    environment:
      SERVER_PORT: 9010
      RETRIEVAL_SERVICE_PORT: 9010
      JAVA_OPTS: "-Xms1g -Xmx2g"
    depends_on:
      chroma-faq:
        condition: service_healthy
      zipkin:
        condition: service_started
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/actuator/health"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 420s
    restart: unless-stopped

  analytics-mysql:
    image: mysql:8.4
    container_name: analytics-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: rag_analytics
      MYSQL_USER: analytics
      MYSQL_PASSWORD: ${ANALYTICS_MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ANALYTICS_MYSQL_ROOT_PASSWORD}
    volumes:
      - analytics_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${ANALYTICS_MYSQL_ROOT_PASSWORD}"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - faq-network
    restart: unless-stopped

  rag-analytics:
    build:
      context: ./rag-analytics
      dockerfile: Dockerfile
    container_name: rag-analytics
    ports:
      - "9191:9191"
    environment:
      APP_PORT: 9191
      ANALYTICS_DB_HOST: analytics-mysql
      ANALYTICS_DB_PORT: 3306
      ANALYTICS_DB_NAME: rag_analytics
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_MYSQL_PASSWORD}
    depends_on:
      analytics-mysql:
        condition: service_healthy
    networks:
      - faq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9191/actuator/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Distributed Tracing - Zipkin
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faq-network
    restart: unless-stopped

  # Lightweight local log viewer. Use docker-compose.elk.yml for full ELK.
  dozzle:
    image: amir20/dozzle:v8.14.6
    container_name: dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faq-network
    restart: unless-stopped

  # React UI - connects to all three stacks
  faq-ui:
    build:
      context: ./faq-assistance-ui
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9080}
    ports:
      - "5173:5173"
    depends_on:
      spring-ai-agentic:
        condition: service_started
      langchain-agentic:
        condition: service_started
      langgraph-agentic:
        condition: service_started
      faq-ingestion:
        condition: service_healthy
      spring-ai-faq-retrieval:
        condition: service_healthy
    networks:
      - faq-network
    environment:
      VITE_API_HOST: localhost

volumes:
  neo4j_data:
  redis_data:
    driver: local
  chroma_faq_data:
    driver: local
  faq_uploads:
    driver: local
  faq_chroma:
    driver: local
  faq_metadata:
    driver: local
  analytics_mysql_data:
    driver: local

networks:
  faq-network:
    driver: bridge
