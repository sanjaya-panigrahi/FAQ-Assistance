input {
  tcp {
    port => 5000
    codec => json
  }
  udp {
    port => 5000
    codec => json
  }
  
  # Listen for direct logs from Spring applications
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse Spring Boot logs
  if [logger_name] {
    mutate {
      add_field => { "[@metadata][index_name]" => "spring-logs-%{+YYYY.MM.dd}" }
    }
  }
  
  # Classify severity
  if [level] == "ERROR" or [message] =~ /ERROR|Exception/ {
    mutate {
      add_field => { "severity" => "critical" }
    }
  } else if [level] == "WARN" or [message] =~ /WARN/ {
    mutate {
      add_field => { "severity" => "warning" }
    }
  } else if [level] == "INFO" {
    mutate {
      add_field => { "severity" => "info" }
    }
  } else {
    mutate {
      add_field => { "severity" => "debug" }
    }
  }

  # Parse timestamps
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "unix_ms", "unix" ]
    target => "@timestamp"
  }

  # Extract trace ID if present
  if [traceId] {
    mutate {
      add_field => { "trace_id" => "%{traceId}" }
    }
  }

  # Extract tenant ID if present
  if [tenantId] {
    mutate {
      add_field => { "tenant_id" => "%{tenantId}" }
    }
  }

  # Add environment metadata
  mutate {
    add_field => { 
      "environment" => "production"
      "region" => "us-east-1"
      "version" => "1.0.0"
    }
  }
}

output {
  # Send to Elasticsearch with dynamic index
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    
    # Retry settings
    retry_on_conflict => 3
    action => "index"
    flush_interval => 1
  }

  # Console output for debugging (optional)
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }
}
