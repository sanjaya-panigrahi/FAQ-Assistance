apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: faq-assistance-routing
  namespace: faq-assistance
spec:
  hosts:
    - "*"
  gateways:
    - istio-system/faq-assistance-gateway
  http:
    - name: spring-agentic
      match:
        - uri:
            prefix: /spring/agentic
      rewrite:
        uri: /agentic
      route:
        - destination:
            host: spring-ai-unified
            port:
              number: 9000
    - name: spring-graph
      match:
        - uri:
            prefix: /spring/graph
      rewrite:
        uri: /graph
      route:
        - destination:
            host: spring-ai-unified
            port:
              number: 9000
    - name: spring-retrieval
      match:
        - uri:
            prefix: /spring/retrieval
      rewrite:
        uri: /
      route:
        - destination:
            host: spring-ai-faq-retrieval
            port:
              number: 9010
    - name: langchain-graph
      match:
        - uri:
            prefix: /langchain/graph
      rewrite:
        uri: /graph
      route:
        - destination:
            host: langchain-unified
            port:
              number: 8000
    - name: langgraph-graph
      match:
        - uri:
            prefix: /langgraph/graph
      rewrite:
        uri: /graph
      route:
        - destination:
            host: langgraph-unified
            port:
              number: 8000
