apiVersion: v1
kind: Secret
metadata:
  name: openai-secrets
  namespace: faq-assistance
type: Opaque
stringData:
  openai-api-key: "${OPENAI_API_KEY}"
  # Inject at deploy time from shell env or project .env
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: faq-assistance
type: Opaque
stringData:
  mysql-root-password: "${MYSQL_ROOT_PASSWORD}"
  mysql-password: "${MYSQL_PASSWORD}"
  # Inject at deploy time from shell env/.env with safe defaults only if missing
---
apiVersion: v1
kind: Secret
metadata:
  name: kong-secrets
  namespace: faq-assistance
type: Opaque
stringData:
  kong-db-password: "${KONG_DB_PASSWORD}"
  # Inject at deploy time from shell env/.env or generated fallback
---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secrets
  namespace: faq-assistance
type: Opaque
stringData:
  neo4j-password: "${NEO4J_PASSWORD}"
  neo4j-auth: "neo4j/${NEO4J_PASSWORD}"
  # Inject at deploy time from shell env/.env or generated fallback
