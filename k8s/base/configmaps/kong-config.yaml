apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: faq-assistance
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
            - http://localhost:3000
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - PATCH
          headers:
            - Content-Type
            - Authorization
            - X-Requested-With
            - Accept
          credentials: true
          max_age: 3600

    services:
      - name: spring-agentic
        url: http://spring-ai-unified:9000/agentic
        routes:
          - name: spring-agentic-route
            paths:
              - /spring/agentic
            strip_path: true

      - name: spring-neo4j-graph
        url: http://spring-ai-unified:9000/graph
        routes:
          - name: spring-neo4j-graph-route
            paths:
              - /spring/graph
            strip_path: true

      - name: spring-corrective
        url: http://spring-ai-unified:9000/corrective
        routes:
          - name: spring-corrective-route
            paths:
              - /spring/corrective
            strip_path: true

      - name: spring-multimodal
        url: http://spring-ai-unified:9000/multimodal
        routes:
          - name: spring-multimodal-route
            paths:
              - /spring/multimodal
            strip_path: true

      - name: spring-hierarchical
        url: http://spring-ai-unified:9000/hierarchical
        routes:
          - name: spring-hierarchical-route
            paths:
              - /spring/hierarchical
            strip_path: true

      - name: faq-ingestion
        url: http://faq-ingestion:9000
        routes:
          - name: faq-ingestion-route
            paths:
              - /spring/ingestion
            strip_path: true

      - name: spring-faq-retrieval
        url: http://spring-ai-faq-retrieval:9010
        routes:
          - name: spring-faq-retrieval-route
            paths:
              - /spring/retrieval
            strip_path: true

      - name: rag-analytics
        url: http://rag-analytics:9191
        routes:
          - name: rag-analytics-route
            paths:
              - /spring/analytics
            strip_path: true

      - name: langchain-unified-agentic
        url: http://langchain-unified:8000/agentic
        routes:
          - name: langchain-unified-agentic-route
            paths:
              - /langchain/agentic
            strip_path: true

      - name: langchain-retrieval
        url: http://langchain-unified:8000/retrieval
        routes:
          - name: langchain-retrieval-route
            paths:
              - /langchain/retrieval
            strip_path: true

      - name: langchain-unified-graph
        url: http://langchain-unified:8000/graph
        routes:
          - name: langchain-unified-graph-route
            paths:
              - /langchain/graph
            strip_path: true

      - name: langchain-unified-corrective
        url: http://langchain-unified:8000/corrective
        routes:
          - name: langchain-unified-corrective-route
            paths:
              - /langchain/corrective
            strip_path: true

      - name: langchain-unified-multimodal
        url: http://langchain-unified:8000/multimodal
        routes:
          - name: langchain-unified-multimodal-route
            paths:
              - /langchain/multimodal
            strip_path: true

      - name: langchain-unified-hierarchical
        url: http://langchain-unified:8000/hierarchical
        routes:
          - name: langchain-unified-hierarchical-route
            paths:
              - /langchain/hierarchical
            strip_path: true

      - name: langgraph-unified-agentic
        url: http://langgraph-unified:8000/agentic
        routes:
          - name: langgraph-unified-agentic-route
            paths:
              - /langgraph/agentic
            strip_path: true

      - name: langgraph-retrieval
        url: http://langgraph-unified:8000/retrieval
        routes:
          - name: langgraph-retrieval-route
            paths:
              - /langgraph/retrieval
            strip_path: true

      - name: langgraph-unified-graph
        url: http://langgraph-unified:8000/graph
        routes:
          - name: langgraph-unified-graph-route
            paths:
              - /langgraph/graph
            strip_path: true

      - name: langgraph-unified-corrective
        url: http://langgraph-unified:8000/corrective
        routes:
          - name: langgraph-unified-corrective-route
            paths:
              - /langgraph/corrective
            strip_path: true

      - name: langgraph-unified-multimodal
        url: http://langgraph-unified:8000/multimodal
        routes:
          - name: langgraph-unified-multimodal-route
            paths:
              - /langgraph/multimodal
            strip_path: true

      - name: langgraph-unified-hierarchical
        url: http://langgraph-unified:8000/hierarchical
        routes:
          - name: langgraph-unified-hierarchical-route
            paths:
              - /langgraph/hierarchical
            strip_path: true