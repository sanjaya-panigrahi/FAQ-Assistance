apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-unified
  namespace: faq-assistance
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app: langchain-unified
  template:
    metadata:
      labels:
        app: langchain-unified
        framework: langchain
    spec:
      automountServiceAccountToken: false
      containers:
      - name: langchain-unified
        image: faq-assistance:langchain-unified-1.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: CHROMA_URL
          value: "http://chroma-faq:8000"
        - name: NEO4J_URI
          value: "bolt://neo4j-unified:7687"
        - name: NEO4J_USERNAME
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: neo4j-secrets
              key: neo4j-password
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key
        - name: OPENAI_CHAT_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_CHAT_MODEL
        - name: OPENAI_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_EMBEDDING_MODEL
        - name: FAQ_SOURCE_FILE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: FAQ_SOURCE_FILE
        - name: REDIS_URL
          value: "redis://redis-cache:6379/0"
        ports:
        - containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
