apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agentic
  namespace: faq-assistance
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app: langgraph-agentic
  template:
    metadata:
      labels:
        app: langgraph-agentic
        pattern: agentic
        framework: langgraph
    spec:
      automountServiceAccountToken: false
      containers:
      - name: langgraph-agentic
        image: faq-assistance:langgraph-agentic-1.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: APP_PORT
          value: "8281"
        - name: CHROMA_HOST
          value: "chroma-faq"
        - name: CHROMA_PORT
          value: "8000"
        - name: CHROMA_COLLECTION_PREFIX
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CHROMA_COLLECTION_PREFIX
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
        - name: OPENAI_CHAT_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_CHAT_MODEL
        - name: OPENAI_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_EMBEDDING_MODEL
        ports:
        - containerPort: 8281
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8281
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8281
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 5
---
