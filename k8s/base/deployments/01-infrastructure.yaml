apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: mysql-root-password
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: mysql-password
        - name: MYSQL_PWD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: mysql-root-password
        - name: MYSQL_USER
          value: faq_user
        - name: MYSQL_DATABASE
          value: faq_analytics
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mysqladmin ping -h 127.0.0.1 -u root --silent
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma-faq
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma-faq
  template:
    metadata:
      labels:
        app: chroma-faq
    spec:
      automountServiceAccountToken: false
      containers:
      - name: chroma
        image: chromadb/chroma:0.5.23
        env:
        - name: PERSIST_DIRECTORY
          value: "/data"
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: chroma-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        startupProbe:
          httpGet:
            path: /api/v2/heartbeat
            port: 8000
          failureThreshold: 24
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/v2/heartbeat
            port: 8000
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: chroma-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      automountServiceAccountToken: false
      containers:
      - name: consul
        image: hashicorp/consul:1.18
        command: ["consul", "agent", "-server", "-bootstrap-expect=1", "-ui", "-client", "0.0.0.0", "-data-dir=/consul/data"]
        ports:
        - containerPort: 8500
          name: http
        - containerPort: 8600
          name: dns
        volumeMounts:
        - name: consul-storage
          mountPath: /consul/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ui/
            port: 8500
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: consul-storage
        persistentVolumeClaim:
          claimName: consul-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-unified
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-unified
  template:
    metadata:
      labels:
        app: neo4j-unified
    spec:
      automountServiceAccountToken: false
      containers:
      - name: neo4j
        image: neo4j:5.24
        env:
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: neo4j-secrets
              key: password
        - name: NEO4J_server_memory_heap_initial__size
          value: "1g"
        - name: NEO4J_server_memory_heap_max__size
          value: "2g"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "512m"
        - name: NEO4J_PLUGINS
          value: '["apoc"]'
        - name: NEO4J_dbms_security_procedures_allowlist
          value: "apoc.coll.*,apoc.convert.*,apoc.map.*,apoc.text.*"
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        ports:
        - containerPort: 7687
          name: bolt
        - containerPort: 7474
          name: http
        volumeMounts:
        - name: neo4j-storage
          mountPath: /var/lib/neo4j/data
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: neo4j-storage
        persistentVolumeClaim:
          claimName: neo4j-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      automountServiceAccountToken: false
      containers:
      - name: redis
        image: redis:7.2-alpine
        command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
