apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: mysql-root-password
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: mysql-password
        - name: MYSQL_USER
          value: faq_user
        - name: MYSQL_DATABASE
          value: faq_analytics
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mysqladmin ping -u root -p$MYSQL_ROOT_PASSWORD
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma-faq
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma-faq
  template:
    metadata:
      labels:
        app: chroma-faq
    spec:
      containers:
      - name: chroma
        image: chromadb/chroma:latest
        env:
        - name: CHROMA_DB_IMPL
          value: "duckdb+parquet"
        - name: PERSIST_DIRECTORY
          value: "/data"
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: chroma-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v2/heartbeat
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: chroma-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: faq-assistance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
      - name: consul
        image: hashicorp/consul:1.18
        command: ["consul", "agent", "-server", "-bootstrap-expect=1", "-ui", "-client", "0.0.0.0", "-data-dir=/consul/data"]
        ports:
        - containerPort: 8500
          name: http
        - containerPort: 8600
          name: dns
        volumeMounts:
        - name: consul-storage
          mountPath: /consul/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ui/
            port: 8500
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: consul-storage
        persistentVolumeClaim:
          claimName: consul-pvc
