apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-agentic
  namespace: faq-assistance
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app: spring-ai-agentic
  template:
    metadata:
      labels:
        app: spring-ai-agentic
        pattern: agentic
        framework: spring-ai
    spec:
      automountServiceAccountToken: false
      containers:
      - name: spring-ai-agentic
        image: faq-assistance:spring-ai-agentic-1.0.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: faq-source-data
          mountPath: /shared-data
        env:
        - name: CHROMA_URL
          value: "http://chroma-faq:8000"
        - name: CHROMA_COLLECTION_PREFIX
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CHROMA_COLLECTION_PREFIX
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
        - name: OPENAI_CHAT_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_CHAT_MODEL
        - name: OPENAI_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_EMBEDDING_MODEL
        - name: FAQ_SOURCE_FILE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: FAQ_SOURCE_FILE
        ports:
        - containerPort: 8081
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 5
      volumes:
      - name: faq-source-data
        configMap:
          name: faq-source-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-faq-retrieval
  namespace: faq-assistance
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app: spring-ai-faq-retrieval
  template:
    metadata:
      labels:
        app: spring-ai-faq-retrieval
        pattern: retrieval
        framework: spring-ai
    spec:
      automountServiceAccountToken: false
      containers:
      - name: spring-ai-faq-retrieval
        image: faq-assistance:spring-ai-faq-retrieval-1.0.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: faq-source-data
          mountPath: /shared-data
        env:
        - name: CHROMA_URL
          value: "http://chroma-faq:8000"
        - name: CHROMA_COLLECTION_PREFIX
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CHROMA_COLLECTION_PREFIX
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: openai-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
        - name: OPENAI_CHAT_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_CHAT_MODEL
        - name: OPENAI_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OPENAI_EMBEDDING_MODEL
        - name: FAQ_SOURCE_FILE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: FAQ_SOURCE_FILE
        - name: SPRING_REDIS_HOST
          value: "redis-cache"
        - name: SPRING_REDIS_PORT
          value: "6379"
        - name: SPRING_CACHE_TYPE
          value: "none"
        ports:
        - containerPort: 9010
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 9010
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9010
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: faq-source-data
        configMap:
          name: faq-source-data
---
