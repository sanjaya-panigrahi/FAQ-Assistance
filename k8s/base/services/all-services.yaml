apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: faq-assistance
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None  # Headless service for stateful application
---
