services:
  kong:
    image: kong:3.7
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DNS_STALE_TTL: 3600
      KONG_DNS_NOT_FOUND_TTL: 1
      KONG_DNS_ERROR_TTL: 1
      KONG_DNS_VALID_TTL: 5
      KONG_UPSTREAM_CONNECT_TIMEOUT: 120000
      KONG_UPSTREAM_SEND_TIMEOUT: 120000
      KONG_UPSTREAM_READ_TIMEOUT: 180000
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "9080:8000"
      - "9081:8001"
    depends_on:
      - spring-ai-agentic
      - spring-ai-neo4j-graph
      - spring-ai-corrective
      - spring-ai-multimodal
      - spring-ai-hierarchical
      - langchain-agentic
      - langchain-neo4j-graph
      - langchain-corrective
      - langchain-multimodal
      - langchain-hierarchical
      - langgraph-agentic
      - langgraph-neo4j-graph
      - langgraph-corrective
      - langgraph-multimodal
      - langgraph-hierarchical
      - faq-ingestion
      - spring-ai-faq-retrieval
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - faq-network
      - default
    restart: unless-stopped

networks:
  faq-network:
    external: false
