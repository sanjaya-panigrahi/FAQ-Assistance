server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 1024;

    # SPA fallback — all unmatched routes return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets produced by Vite
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
