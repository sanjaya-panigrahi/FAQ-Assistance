services:
  neo4j-langgraph:
    image: neo4j:5.22
    container_name: neo4j-langgraph
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  langgraph-agentic:
    build:
      context: ./langgraph-agentic
      dockerfile: Dockerfile
    ports:
      - "8281:8281"
    env_file: .env.langgraph
    environment:
      APP_PORT: 8281
    volumes:
      - ./shared-data:/opt/data:ro

  langgraph-neo4j-graph:
    build:
      context: ./langgraph-neo4j-graph
      dockerfile: Dockerfile
    ports:
      - "8282:8282"
    env_file: .env.langgraph
    environment:
      APP_PORT: 8282
    depends_on:
      - neo4j-langgraph
    volumes:
      - ./shared-data:/opt/data:ro

  langgraph-corrective:
    build:
      context: ./langgraph-corrective
      dockerfile: Dockerfile
    ports:
      - "8283:8283"
    env_file: .env.langgraph
    environment:
      APP_PORT: 8283
    volumes:
      - ./shared-data:/opt/data:ro

  langgraph-multimodal:
    build:
      context: ./langgraph-multimodal
      dockerfile: Dockerfile
    ports:
      - "8284:8284"
    env_file: .env.langgraph
    environment:
      APP_PORT: 8284
    volumes:
      - ./shared-data:/opt/data:ro

  langgraph-hierarchical:
    build:
      context: ./langgraph-hierarchical
      dockerfile: Dockerfile
    ports:
      - "8285:8285"
    env_file: .env.langgraph
    environment:
      APP_PORT: 8285
    volumes:
      - ./shared-data:/opt/data:ro
