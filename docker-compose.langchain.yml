services:
  neo4j-langchain:
    image: neo4j:5.22
    container_name: neo4j-langchain
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  langchain-agentic:
    build:
      context: ./langchain-agentic
      dockerfile: Dockerfile
    ports:
      - "8181:8181"
    env_file: .env.langchain
    volumes:
      - ./shared-data:/opt/data:ro

  langchain-neo4j-graph:
    build:
      context: ./langchain-neo4j-graph
      dockerfile: Dockerfile
    ports:
      - "8182:8182"
    env_file: .env.langchain
    depends_on:
      - neo4j-langchain
    volumes:
      - ./shared-data:/opt/data:ro

  langchain-corrective:
    build:
      context: ./langchain-corrective
      dockerfile: Dockerfile
    ports:
      - "8183:8183"
    env_file: .env.langchain
    volumes:
      - ./shared-data:/opt/data:ro

  langchain-multimodal:
    build:
      context: ./langchain-multimodal
      dockerfile: Dockerfile
    ports:
      - "8184:8184"
    env_file: .env.langchain
    volumes:
      - ./shared-data:/opt/data:ro

  langchain-hierarchical:
    build:
      context: ./langchain-hierarchical
      dockerfile: Dockerfile
    ports:
      - "8185:8185"
    env_file: .env.langchain
    volumes:
      - ./shared-data:/opt/data:ro
