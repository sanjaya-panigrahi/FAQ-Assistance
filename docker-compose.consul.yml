services:
  consul:
    image: hashicorp/consul:1.19
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -config-dir=/consul/config
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
      - ./consul/config:/consul/config
    networks:
      - faq-network
    restart: unless-stopped
    labels:
      SERVICE_IGNORE: "true"

  spring-ai-agentic:
    labels:
      SERVICE_NAME: spring-ai-agentic
      SERVICE_TAGS: spring,agentic,rag
      SERVICE_CHECK_HTTP: /actuator/health
      SERVICE_CHECK_INTERVAL: 15s
      SERVICE_CHECK_TIMEOUT: 3s
      SERVICE_CHECK_DEREGISTER_AFTER: 1m

  spring-ai-neo4j-graph:
    labels:
      SERVICE_NAME: spring-ai-neo4j-graph
      SERVICE_TAGS: spring,graph,neo4j,rag
      SERVICE_CHECK_HTTP: /actuator/health
      SERVICE_CHECK_INTERVAL: 15s
      SERVICE_CHECK_TIMEOUT: 3s
      SERVICE_CHECK_DEREGISTER_AFTER: 1m

  spring-ai-corrective:
    labels:
      SERVICE_NAME: spring-ai-corrective
      SERVICE_TAGS: spring,corrective,rag
      SERVICE_CHECK_HTTP: /actuator/health
      SERVICE_CHECK_INTERVAL: 15s
