server:
  port: 9000

spring:
  application:
    name: spring-ai-unified
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  cache:
    type: redis
    redis:
      time-to-live: 400000
      key-prefix: "unified-rag:"
  data:
    redis:
      host: ${REDIS_HOST:redis-cache}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:gpt-4o-mini}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  neo4j:
    uri: ${NEO4J_URI:bolt://neo4j:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4jpass}

faq:
  source-file: ${FAQ_SOURCE_FILE:/opt/data/mytechstore-faq.md}

chroma:
  url: ${APP_CHROMA_URL:http://chroma-faq:8000}
  collection-prefix: ${APP_CHROMA_COLLECTION_NAME_PREFIX:faq_}
retrieval:
  top-k: ${APP_RAG_TOP_K_RESULTS:6}

tavily:
  api-key: ${TAVILY_API_KEY:}
  url: ${TAVILY_SEARCH_URL:https://api.tavily.com/search}

openai:
  vision:
    model: ${OPENAI_VISION_MODEL:gpt-4o-mini}

app:
  tasks:
    redis-prefix: ${APP_TASK_REDIS_PREFIX:graph-task:}
    ttl: ${APP_TASK_TTL:24h}
  events:
    enabled: ${APP_EVENTS_ENABLED:false}
    topic: ${APP_EVENTS_TOPIC:graph.tasks.lifecycle.v1}
    source-service: ${APP_EVENTS_SOURCE_SERVICE:spring-ai-unified}
    consumer-enabled: ${APP_EVENTS_CONSUMER_ENABLED:false}
    consumer-group-id: ${APP_EVENTS_CONSUMER_GROUP_ID:spring-ai-unified-consumer}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

# MCP Client Configuration (enabled via USE_MCP=true)
mcp:
  enabled: ${USE_MCP:false}
  servers:
    chromadb:
      url: ${MCP_CHROMADB_URL:http://mcp-chromadb:8301}
    neo4j:
      url: ${MCP_NEO4J_URL:http://mcp-neo4j:8302}
    llm-gateway:
      url: ${MCP_LLM_GATEWAY_URL:http://mcp-llm-gateway:8303}
    web-search:
      url: ${MCP_WEB_SEARCH_URL:http://mcp-web-search:8304}
    cache:
      url: ${MCP_CACHE_URL:http://mcp-cache:8305}
    analytics:
      url: ${MCP_ANALYTICS_URL:http://mcp-analytics:8306}
  api-key: ${MCP_API_KEY:}
